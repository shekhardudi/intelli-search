
services:
  # =========================================================================
  # OpenSearch - Primary Search Engine
  # # =========================================================================
  opensearch-node1:
    image: opensearchproject/opensearch:latest
    container_name: intelli-search-opensearch-node1
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms3g -Xmx3g"
      # Disable security for development/testing
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=MySecurePassword123!
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - 9200:9200
      - 9600:9600
    networks:
      - search-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: intelli-search-opensearch-dashboards
    ports:
      - 5601:5601
    expose:
      - "5601"
    environment:
      OPENSEARCH_HOSTS: '["https://intelli-search-opensearch-node1:9200"]'
      opensearch.ssl.verificationMode: none
      opensearch.username: admin
      opensearch.password: MySecurePassword123!
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: MySecurePassword123!
    networks:
      - search-network


  # =========================================================================
  # Redis - Caching & Session Management
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: intelli-search-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - search-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # =========================================================================
  # FastAPI Backend
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelli-search-backend
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - OPENSEARCH_HOST=opensearch-node1
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-MySecurePassword123!}
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=intelli-search
    volumes:
      - ./backend:/app
    networks:
      - search-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  
  # =========================================================================
  # React Frontend
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelli-search-frontend
    ports:
      - "5173:5173"
      - "5174:5174"

    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - search-network
    environment:
      - VITE_API_URL=http://localhost:8000

  # =========================================================================
  # Observability Stack
  # =========================================================================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: intelli-search-otel-collector
    command: ["--config=/etc/otelcol/otelcol-config.yaml"]
    volumes:
      - ./infrastructure/otel-collector/otelcol-config.yaml:/etc/otelcol/otelcol-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (app → collector)
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus scrape endpoint
    networks:
      - search-network
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: intelli-search-prometheus
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - search-network
    depends_on:
      - otel-collector

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: intelli-search-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC (mapped to host 14317 to avoid clash)
    networks:
      - search-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: intelli-search-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - search-network
    depends_on:
      - prometheus
      - jaeger

volumes:
  opensearch-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  search-network:
    driver: bridge
